seed: 42

data:
  resize: null
  num_workers: 4

model:
  illumination_channels: 32
  lumi_rest_channels: 32
  illum_arch: default
  disable_rotation: false
  disable_le_cond: false
  disable_gate: false
  disable_residual: false

constants:
  tau: 0.10
  pmax: 5.0
  omega: 15.0
  eps: 0.000001
  illum_adjust_mode: gamma

pretrained:
  illumination: pretrained/illum_ckpt.pth
  lumi_rest: pretrained/lumi_rest_ckpt.pth

train:
  batch_size: 4
  epochs: 100
  lr: 0.0001
  log_interval: 50
  save_dir: runs/default
  save_name: checkpoint.pth
  save_interval: 20
  amp: true
  lambda_illum: 1.0
  lambda_tv: 0.1
  lambda_recon: 1.0
  lambda_grad: 0.1
  lambda_color: 0.5
  lambda_delta: 0.15
  mask_prob: 0.2
  full_input_prob: 0.5

noise:
  sigma_min: 0.01
  sigma_max: 0.05

inference:
  output_dir: outputs/inference
  batch_size: 1
  tta: false
  bilateral: false
  contrast: false
  sharpen: false
  gray_world: false
  bilateral_d: 9
  bilateral_sigma_color: 30.0
  bilateral_sigma_space: 9.0
  contrast_clip_pct: 1.0
  sharpen_sigma: 1.0
  sharpen_strength: 0.3
  gray_world_strength: 0.3

evaluation:
  compute_lpips: false
